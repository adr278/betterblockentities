# Manual Gradle-based release workflow
# Generates tags, changelogs, and uploads release assets

name: release-build

on:
  push:
    tags:
      - '*' # Runs when a tag is pushed

permissions:
  contents: write  # Needed to push tags and create releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed to access all tags for changelog comparison

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Extract Gradle version
        id: version
        run: |
          version=$(./gradlew properties | grep "^version:" | awk '{print $2}')
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "Detected version: ${version}"

      - name: Generate changelog
        id: changelog
        run: |
          tag="v${{ steps.version.outputs.version }}"
          branch="${GITHUB_REF_NAME}"

          current_sodium_raw=$(grep "^sodium_version" gradle.properties | cut -d'=' -f2)
          current_sodium=$(echo "$current_sodium_raw" | sed -E 's/.*-([0-9]+\.[0-9]+\.[0-9]+)-.*/\1/')

          git fetch --tags
          previous_tag=$(git describe --tags --abbrev=0 "$tag"^ 2>/dev/null || echo "")

          if [ -n "$previous_tag" ]; then
            git show "$previous_tag:gradle.properties" > old_gradle.properties 2>/dev/null || true
            previous_sodium_raw=$(grep "^sodium_version" old_gradle.properties | cut -d'=' -f2)
            previous_sodium=$(echo "$previous_sodium_raw" | sed -E 's/.*-([0-9]+\.[0-9]+\.[0-9]+)-.*/\1/')
          else
            previous_sodium=""
          fi

          if [ -z "$previous_sodium" ] || [ "$previous_sodium" = "$current_sodium" ]; then
            sodium_display="$current_sodium"
          else
            sodium_display="${previous_sodium}–${current_sodium}"
          fi

          mc_version=$(grep "^minecraft_version" gradle.properties | cut -d'=' -f2)

          declare -A mc_override_low=(
            ["1.21.8"]="1.21.6"
            ["1.21.10"]="1.21.9"
          )
          declare -A mc_override_high=(
            ["1.21.8"]="1.21.8"
            ["1.21.10"]="1.21.10"
          )

          if [[ -n "${mc_override_low[$branch]}" ]]; then
            mc_low="${mc_override_low[$branch]}"
            mc_high="${mc_override_high[$branch]}"
          else
            mc_low="$mc_version"
            mc_high="$mc_version"
          fi

          if [[ "$mc_low" == "$mc_high" ]]; then
            mc_display="$mc_low"
          else
            mc_display="${mc_low}–${mc_high}"
          fi

          echo "## Minecraft ${mc_display} (Sodium ${sodium_display})" > changelog.md
          echo "## 🗒️ Changelog for ${tag}" >> changelog.md
          echo "" >> changelog.md

          if [ -n "$previous_tag" ]; then
            range="$previous_tag..$tag"
          else
            range="$tag"
          fi

          commits=$(git log $range --pretty=format:"%s" \
            | grep -Ev "^(merge|Merge)" \
            | grep -Ev "^(readme|Readme|README)")

          if [ -z "$commits" ]; then
            echo "_No changes in this release._" >> changelog.md
          else
            echo "$commits" | sed 's/^/- /' >> changelog.md
          fi

          echo "Generated changelog:"
          cat changelog.md

      - name: Build project
        run: ./gradlew build -Pbuild.release=true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: changelog.md
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
